services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: parkinguser
      POSTGRES_PASSWORD: parkingpass
      POSTGRES_DB: smartparking
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkinguser -d smartparking"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
